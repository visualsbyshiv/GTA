version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: gta_postgres
    restart: always
    environment:
      POSTGRES_USER: gta_user
      POSTGRES_PASSWORD: gta_password
      POSTGRES_DB: gta_game
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: gta_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
