<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GTA Web Live Simulation</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; background: #111; }
        #hud { position: absolute; top: 20px; left: 20px; color: white; background: rgba(0,0,0,0.7); padding: 15px; border-radius: 8px; font-size: 18px; pointer-events: none; }
        #controls { position: absolute; bottom: 20px; left: 20px; color: #aaa; background: rgba(0,0,0,0.7); padding: 10px; border-radius: 5px; font-size: 12px; }
        .star { color: #ffcc00; font-size: 22px; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="hud">
        <h2>LOS SANTOS (WEB 3D)</h2>
        <div>💰 Money: <span id="money">$0</span></div>
        <div>🚨 Wanted Level: <span id="stars">None</span></div>
        <div style="margin-top: 10px; font-size: 14px; color: #4caf50;" id="status">Connecting to server...</div>
    </div>

    <div id="controls">
        <b>Controls:</b> W, A, S, D to Move Player | <b>F</b> to Enter/Exit Car | <b>H</b> to Trigger Heist
    </div>

    <script>
        const SERVER_URL = "http://localhost:3001";
        const USERNAME = "shiv";
        let USER_ID = 1; // Default fallback

        // 1. Setup 3D Scene
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xa0a0a0);
        scene.fog = new THREE.Fog(0xa0a0a0, 10, 50);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // Lights
        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(10, 20, 10);
        light.castShadow = true;
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x404040));

        // Ground (City Grid)
        const gridHelper = new THREE.GridHelper(100, 100, 0x000000, 0x444444);
        gridHelper.position.y = -0.01;
        scene.add(gridHelper);

        // 2. Create Objects (Player and Car)
        // Player (Blue Box)
        const playerGeo = new THREE.BoxGeometry(1, 2, 1);
        const playerMat = new THREE.MeshStandardMaterial({ color: 0x0000ff });
        const player = new THREE.Mesh(playerGeo, playerMat);
        player.position.set(0, 1, 0);
        scene.add(player);

        // Car (Red Box)
        const carGeo = new THREE.BoxGeometry(2, 1.2, 4);
        const carMat = new THREE.MeshStandardMaterial({ color: 0xff0000 });
        const car = new THREE.Mesh(carGeo, carMat);
        car.position.set(5, 0.6, -5);
        scene.add(car);

        // 3. Gameplay Variables
        let playerStats = { money: 0, wanted_level: 0 };
        let keys = {};
        let inCar = false;
        let moveSpeed = 0.15;

        // Input Listeners
        window.addEventListener('keydown', e => { keys[e.key.toLowerCase()] = true; });
        window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

        // Interaction (Enter Car / Heist)
        window.addEventListener('keypress', e => {
            if (e.key.toLowerCase() === 'f') {
                let dist = player.position.distanceTo(car.position);
                if (dist < 3 && !inCar) {
                    inCar = true;
                    player.visible = false;
                    document.getElementById('status').innerText = "Driving Car...";
                    updateServer(500, 1); // Earn $500 for grand theft auto
                } else if (inCar) {
                    inCar = false;
                    player.position.copy(car.position).x += 2; // Spawn next to car
                    player.visible = true;
                    document.getElementById('status').innerText = "On Foot";
                }
            }
            if (e.key.toLowerCase() === 'h') {
                document.getElementById('status').innerText = "Heist Successful! Police Alerted!";
                updateServer(10000, 3); // Earn $10,000, +3 Stars
            }
        });

        // 4. Sync with Live Port 3001 Server
        async function authenticateUser() {
            try {
                // Try Login
                let loginRes = await fetch(`${SERVER_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: USERNAME, password: "gta123" })
                });
                
                if (loginRes.ok) {
                    let loginData = await loginRes.json();
                    USER_ID = loginData.userId;
                    document.getElementById('status').innerText = `Logged in as shiv (ID: ${USER_ID})`;
                } else {
                    // Try Register
                    let regRes = await fetch(`${SERVER_URL}/auth/register`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username: USERNAME, password: "gta123" })
                    });
                    if (regRes.ok) {
                        let regData = await regRes.json();
                        USER_ID = regData.user.id;
                        document.getElementById('status').innerText = `Registered profile. ID: ${USER_ID}`;
                    }
                }
            } catch(e) {
                console.warn("Auth server offline. Using local mock state.");
                document.getElementById('status').innerText = "Using Offline Mock DB";
            }
            
            // Initial fetch
            fetchServerState();
        }

        async function fetchServerState() {
            try {
                let res = await fetch(`${SERVER_URL}/save/${USER_ID}`);
                if (res.ok) {
                    let data = await res.json();
                    playerStats.money = data.money || 0;
                    playerStats.wanted_level = data.wanted_level || 0;
                    
                    // Sync 3D position if not driving
                    if (!inCar && data.pos_x !== 0) {
                        player.position.set(data.pos_x, data.pos_y, data.pos_z);
                    }
                    updateHUD();
                }
            } catch(e) {
                console.log("Server unreachable, falling back to local simulation logic");
            }
        }

        async function updateServer(moneyGain, wantedGain) {
            let nextWanted = Math.min(5, playerStats.wanted_level + wantedGain);
            let currentObj = inCar ? car : player;

            try {
                let res = await fetch(`${SERVER_URL}/save/${USER_ID}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        money: moneyGain, // Send incremental change
                        wanted_level: nextWanted,
                        pos_x: currentObj.position.x,
                        pos_y: currentObj.position.y,
                        pos_z: currentObj.position.z,
                        rot_yaw: Math.round(currentObj.rotation.y * (180 / Math.PI))
                    })
                });

                if (res.ok) {
                    let resJson = await response.json();
                    playerStats.money = resJson.saveState.money;
                    playerStats.wanted_level = resJson.saveState.wanted_level;
                } else {
                    playerStats.money += moneyGain;
                    playerStats.wanted_level = nextWanted;
                }
            } catch(e) { 
                // Local fallback on connection issues
                playerStats.money += moneyGain;
                playerStats.wanted_level = nextWanted;
            }

            updateHUD();
        }

        function updateHUD() {
            document.getElementById('money').innerText = "$" + playerStats.money.toLocaleString();
            document.getElementById('stars').innerHTML = "⭐".repeat(playerStats.wanted_level) || "None";
        }

        // 5. Game Loop (Controls Movement & Camera)
        function animate() {
            requestAnimationFrame(animate);

            let currentObject = inCar ? car : player;

            if (keys['w']) currentObject.translateZ(-moveSpeed);
            if (keys['s']) currentObject.translateZ(moveSpeed);
            if (keys['a']) currentObject.rotation.y += 0.05;
            if (keys['d']) currentObject.rotation.y -= 0.05;

            // Camera follows player/car
            camera.position.set(currentObject.position.x, currentObject.position.y + 5, currentObject.position.z + 10);
            camera.lookAt(currentObject.position);

            renderer.render(scene, camera);
        }

        // Initialize
        authenticateUser();
        setInterval(fetchServerState, 5000); // Auto sync every 5 seconds
        animate();
    </script>
</body>
</html>
